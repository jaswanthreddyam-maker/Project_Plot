[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".git",
    ".next",
    ".venv",
    "node_modules",
    "backend/__pycache__",
    "backend/db",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/alembic/**" = ["E402", "F401"]
