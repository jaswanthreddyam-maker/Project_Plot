version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - lancedb_data:/app/.crewai/memory
      - sqlite_data:/app/db
      - chroma_data:/app/chroma_db
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A worker.celery_app worker --loglevel=info --pool=gevent --concurrency=4 -O fair
    volumes:
      - ./backend:/app
      - lancedb_data:/app/.crewai/memory
      - sqlite_data:/app/db
      - chroma_data:/app/chroma_db
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - lancedb_data:/app/.crewai/memory
      - sqlite_data:/app/db
      - chroma_data:/app/chroma_db
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis

volumes:
  lancedb_data:
  sqlite_data:
  chroma_data:
